// SCREEN 2 — SEARCH RESULTS

function SearchResults({ query, initialCategory, onSelectProduct, onSelectVendor }) {
  const [filterCategory, setFilterCategory] = useState(initialCategory || 'all');
  const [priceMin, setPriceMin] = useState('');
  const [priceMax, setPriceMax] = useState('');
  const [minRating, setMinRating] = useState(0);
  const [onlyInStock, setOnlyInStock] = useState(false);
  const [onlyVerified, setOnlyVerified] = useState(false);
  const [sortBy, setSortBy] = useState('relevance');
  const [viewMode, setViewMode] = useState('grid');
  const [activeFilters, setActiveFilters] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    setLoading(true);
    const t = setTimeout(()=>setLoading(false), 500);
    return () => clearTimeout(t);
  }, [query, filterCategory]);

  const filtered = useMemo(() => {
    let list = PRODUCTS;
    if (query && query.trim()) {
      const q = query.toLowerCase();
      list = list.filter(p =>
        p.name.toLowerCase().includes(q) ||
        p.brand.toLowerCase().includes(q) ||
        p.description.toLowerCase().includes(q) ||
        p.sku.toLowerCase().includes(q)
      );
    }
    if (filterCategory !== 'all') list = list.filter(p => p.category === filterCategory);
    if (priceMin) list = list.filter(p => p.price >= Number(priceMin));
    if (priceMax) list = list.filter(p => p.price <= Number(priceMax));
    if (minRating > 0) list = list.filter(p => p.rating >= minRating);
    if (onlyInStock) list = list.filter(p => p.inStock);
    if (onlyVerified) list = list.filter(p => VENDORS[p.vendorId].verified);
    list = [...list].sort((a,b) => {
      if (sortBy==='price_asc') return a.price - b.price;
      if (sortBy==='price_desc') return b.price - a.price;
      if (sortBy==='rating') return b.rating - a.rating;
      if (sortBy==='new') return b.id.localeCompare(a.id);
      return b.rating*b.reviewCount - a.rating*a.reviewCount;
    });
    return list;
  }, [query, filterCategory, priceMin, priceMax, minRating, onlyInStock, onlyVerified, sortBy]);

  function clearFilters() {
    setFilterCategory('all'); setPriceMin(''); setPriceMax('');
    setMinRating(0); setOnlyInStock(false); setOnlyVerified(false);
  }

  const hasFilters = filterCategory!=='all' || priceMin || priceMax || minRating>0 || onlyInStock || onlyVerified;

  // Filter sidebar
  const FilterPanel = () => (
    <div className="filter-sidebar space-y-5">
      <div className="card p-4">
        <div className="flex items-center justify-between mb-3">
          <p className="text-sm font-bold text-slate-800">Фильтры</p>
          {hasFilters && <button className="text-xs font-medium hover:underline" style={{color:'var(--brand,#2455e8)'}} onClick={clearFilters}>Сбросить</button>}
        </div>

        {/* Category */}
        <div className="mb-4">
          <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Категория</p>
          <div className="space-y-1">
            {CATEGORIES.map(cat => (
              <button key={cat.id}
                className={`w-full text-left px-2.5 py-1.5 rounded-lg text-sm flex items-center justify-between transition-all
                  ${filterCategory===cat.id ? 'font-semibold' : 'text-slate-600 hover:bg-slate-50'}`}
                style={filterCategory===cat.id ? {background:'color-mix(in srgb,var(--brand,#2455e8) 8%,white)', color:'var(--brand,#2455e8)'} : {}}
                onClick={() => setFilterCategory(cat.id)}>
                <span>{cat.icon} {cat.label}</span>
                <span className="text-xs text-slate-400">{cat.count}</span>
              </button>
            ))}
          </div>
        </div>

        {/* Price */}
        <div className="mb-4 pb-4 border-b border-slate-100">
          <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Цена (₽)</p>
          <div className="flex gap-2">
            <input className="input-field text-sm py-1.5" placeholder="от" type="number" value={priceMin} onChange={e=>setPriceMin(e.target.value)}/>
            <input className="input-field text-sm py-1.5" placeholder="до" type="number" value={priceMax} onChange={e=>setPriceMax(e.target.value)}/>
          </div>
        </div>

        {/* Rating */}
        <div className="mb-4 pb-4 border-b border-slate-100">
          <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Рейтинг</p>
          <div className="space-y-1">
            {[0,3,4,4.5].map(r => (
              <button key={r}
                className={`w-full text-left px-2 py-1.5 rounded-lg flex items-center gap-2 text-sm transition-all
                  ${minRating===r ? 'font-semibold' : 'text-slate-600 hover:bg-slate-50'}`}
                style={minRating===r ? {background:'color-mix(in srgb,var(--brand,#2455e8) 8%,white)', color:'var(--brand,#2455e8)'} : {}}
                onClick={() => setMinRating(r)}>
                {r===0 ? 'Любой' : <><Stars rating={r} size={11}/><span>от {r}</span></>}
              </button>
            ))}
          </div>
        </div>

        {/* Toggles */}
        <div className="space-y-3">
          {[
            { label:'Только в наличии', val:onlyInStock, set:setOnlyInStock },
            { label:'Только верифицированные', val:onlyVerified, set:setOnlyVerified },
          ].map(({label,val,set}) => (
            <label key={label} className="flex items-center gap-2.5 cursor-pointer">
              <div className={`w-9 h-5 rounded-full relative transition-all flex-shrink-0 ${val?'':'bg-slate-200'}`}
                style={val?{background:'var(--brand,#2455e8)'}:{}}
                onClick={() => set(v=>!v)}>
                <div className={`absolute top-0.5 w-4 h-4 rounded-full bg-white shadow transition-all ${val?'right-0.5':'left-0.5'}`}/>
              </div>
              <span className="text-sm text-slate-700">{label}</span>
            </label>
          ))}
        </div>
      </div>
    </div>
  );

  return (
    <div className="max-w-6xl mx-auto px-4 py-5 flex gap-5">
      <FilterPanel />

      <div className="flex-1 min-w-0">
        {/* Results header */}
        <div className="flex items-center gap-3 mb-4 flex-wrap">
          <div className="flex-1 min-w-0">
            {query && <p className="text-sm text-slate-500">Результаты по запросу: <span className="font-semibold text-slate-800">«{query}»</span></p>}
            <p className="text-xs text-slate-400 mt-0.5">
              {loading ? 'Поиск...' : `${filtered.length} ${filtered.length===1?'товар':filtered.length<5?'товара':'товаров'}`}
              {hasFilters && ' · Фильтры применены'}
            </p>
          </div>
          <div className="flex items-center gap-2">
            <select className="input-field w-auto text-sm py-1.5" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
              <option value="relevance">По релевантности</option>
              <option value="price_asc">Цена ↑</option>
              <option value="price_desc">Цена ↓</option>
              <option value="rating">По рейтингу</option>
              <option value="new">Новинки</option>
            </select>
            <div className="flex rounded-lg overflow-hidden border border-slate-200">
              {[['grid',<Ic.grid/>],['list',<Ic.list/>]].map(([m,ic]) => (
                <button key={m}
                  className={`w-8 h-8 flex items-center justify-center transition-colors ${viewMode===m?'text-white':'text-slate-400 hover:text-slate-600 bg-white'}`}
                  style={viewMode===m?{background:'var(--brand,#2455e8)'}:{}}
                  onClick={() => setViewMode(m)}>{ic}</button>
              ))}
            </div>
          </div>
        </div>

        {/* Active filter chips */}
        {hasFilters && (
          <div className="flex flex-wrap gap-2 mb-4">
            {filterCategory!=='all' && <FilterChip label={CATEGORIES.find(c=>c.id===filterCategory)?.label} onRemove={()=>setFilterCategory('all')}/>}
            {priceMin && <FilterChip label={`от ${fmt(priceMin)}`} onRemove={()=>setPriceMin('')}/>}
            {priceMax && <FilterChip label={`до ${fmt(priceMax)}`} onRemove={()=>setPriceMax('')}/>}
            {minRating>0 && <FilterChip label={`★ от ${minRating}`} onRemove={()=>setMinRating(0)}/>}
            {onlyInStock && <FilterChip label="В наличии" onRemove={()=>setOnlyInStock(false)}/>}
            {onlyVerified && <FilterChip label="Верифицированные" onRemove={()=>setOnlyVerified(false)}/>}
          </div>
        )}

        {/* Results */}
        {loading ? (
          <div className="flex flex-col items-center justify-center py-20 gap-3 text-slate-400">
            <svg className="spinner w-8 h-8 border-3 border-slate-200 border-t-transparent rounded-full" viewBox="0 0 32 32" style={{borderWidth:'3px'}}/>
            <p className="text-sm">Ищем товары...</p>
          </div>
        ) : filtered.length === 0 ? (
          <div className="card py-16 text-center fade-up">
            <div className="text-5xl mb-4">🔍</div>
            <p className="font-semibold text-slate-700 text-lg">Ничего не найдено</p>
            <p className="text-slate-400 text-sm mt-2 mb-5">Попробуйте изменить запрос или сбросить фильтры</p>
            {hasFilters && <button className="btn-outline-brand" onClick={clearFilters}>Сбросить фильтры</button>}
          </div>
        ) : viewMode === 'grid' ? (
          <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">
            {filtered.map((p,i) => (
              <ProductCard key={p.id} product={p} idx={i} onSelect={()=>onSelectProduct(p.id)} onVendorSelect={()=>onSelectVendor(p.vendorId)}/>
            ))}
          </div>
        ) : (
          <div className="space-y-3">
            {filtered.map((p,i) => (
              <ProductListRow key={p.id} product={p} idx={i} onSelect={()=>onSelectProduct(p.id)} onVendorSelect={()=>onSelectVendor(p.vendorId)}/>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function FilterChip({ label, onRemove }) {
  return (
    <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium border"
      style={{background:'color-mix(in srgb,var(--brand,#2455e8) 8%,white)', color:'var(--brand,#2455e8)', borderColor:'color-mix(in srgb,var(--brand,#2455e8) 30%,white)'}}>
      {label}
      <button className="hover:opacity-70" onClick={onRemove}><Ic.x/></button>
    </span>
  );
}

function ProductCard({ product, idx, onSelect, onVendorSelect }) {
  const vendor = VENDORS[product.vendorId];
  const [wished, setWished] = useState(false);
  return (
    <div className="product-card fade-up" style={{animationDelay:`${idx*40}ms`}}>
      {/* Image */}
      <div className="relative h-36 flex items-center justify-center text-5xl bg-slate-50 border-b border-slate-100 cursor-pointer" onClick={onSelect}>
        {product.image}
        {/* Tags */}
        <div className="absolute top-2 left-2 flex flex-wrap gap-1">
          {product.tags.map(tag => (
            <span key={tag} className="text-xs px-2 py-0.5 rounded-full font-semibold"
              style={tag==='Хит продаж'?{background:'#fef3c7',color:'#92400e'}:tag==='Новинка'?{background:'#dbeafe',color:'#1e40af'}:tag==='Скидка'?{background:'#fce7f3',color:'#9d174d'}:{background:'#f1f5f9',color:'#64748b'}}>
              {tag}
            </span>
          ))}
        </div>
        <button className={`absolute top-2 right-2 w-7 h-7 rounded-full bg-white border border-slate-100 flex items-center justify-center shadow-sm transition-transform hover:scale-110 ${wished?'text-red-500':'text-slate-300'}`}
          onClick={e=>{e.stopPropagation();setWished(v=>!v)}}><Ic.heart filled={wished}/></button>
        {!product.inStock && (
          <div className="absolute inset-0 bg-white/70 flex items-center justify-center">
            <span className="text-xs font-bold text-red-500 bg-white px-3 py-1 rounded-full border border-red-100">Нет в наличии</span>
          </div>
        )}
      </div>
      {/* Content */}
      <div className="p-3">
        <button className="text-left w-full" onClick={onVendorSelect}>
          <VendorTag vendor={vendor}/>
        </button>
        <p className="text-sm font-semibold text-slate-800 mt-1.5 mb-1 leading-snug cursor-pointer hover:text-blue-600 transition-colors line-clamp-2" onClick={onSelect}>
          {product.name}
        </p>
        <p className="text-xs text-slate-400 mb-2">Арт: {product.sku}</p>
        <div className="flex items-center gap-1.5 mb-2">
          <Stars rating={product.rating} size={11}/>
          <span className="text-xs text-slate-500">{product.rating} ({product.reviewCount})</span>
        </div>
        {/* Price */}
        <div className="flex items-baseline gap-2 mb-1">
          <span className="text-lg font-bold text-slate-900">{fmt(product.price)}</span>
          {product.oldPrice && <span className="text-xs text-slate-400 line-through">{fmt(product.oldPrice)}</span>}
        </div>
        {product.minOrder > 1 && <p className="text-xs text-slate-400">Мин. заказ: {product.minOrder} шт.</p>}
        {product.bulkPrices.length > 0 && (
          <p className="text-xs text-green-600 mt-0.5">↓ от {product.bulkPrices[0].from} шт. — {fmt(product.bulkPrices[0].price)}</p>
        )}
        <button className="btn-primary w-full mt-3 py-2 text-sm justify-center" onClick={onSelect} disabled={!product.inStock}>
          {product.inStock ? <><Ic.cart/> В корзину</> : 'Под заказ'}
        </button>
      </div>
    </div>
  );
}

function ProductListRow({ product, idx, onSelect, onVendorSelect }) {
  const vendor = VENDORS[product.vendorId];
  return (
    <div className="card p-4 flex gap-4 cursor-pointer hover:shadow-md transition-all fade-up" style={{animationDelay:`${idx*30}ms`}} onClick={onSelect}>
      <div className="w-20 h-20 flex-shrink-0 bg-slate-50 rounded-xl flex items-center justify-center text-4xl border border-slate-100">{product.image}</div>
      <div className="flex-1 min-w-0">
        <div className="flex items-start gap-2 flex-wrap mb-1">
          <button className="text-left" onClick={e=>{e.stopPropagation();onVendorSelect();}}><VendorTag vendor={vendor}/></button>
          {product.tags.map(tag => <span key={tag} className="text-xs px-1.5 py-0.5 rounded bg-slate-100 text-slate-500 font-medium">{tag}</span>)}
        </div>
        <p className="text-sm font-semibold text-slate-800 mb-1">{product.name}</p>
        <p className="text-xs text-slate-400 mb-1.5">Арт: {product.sku} · Доставка: {product.delivery}</p>
        <div className="flex items-center gap-1.5">
          <Stars rating={product.rating} size={11}/>
          <span className="text-xs text-slate-500">{product.rating} ({product.reviewCount})</span>
          {!product.inStock && <span className="text-xs text-red-500 font-medium ml-2">Нет в наличии</span>}
          {product.inStock && <span className="text-xs text-green-600 font-medium ml-2">В наличии ({product.stockQty} шт.)</span>}
        </div>
      </div>
      <div className="flex-shrink-0 text-right flex flex-col items-end gap-2">
        <div>
          <p className="text-lg font-bold text-slate-900">{fmt(product.price)}</p>
          {product.oldPrice && <p className="text-xs text-slate-400 line-through">{fmt(product.oldPrice)}</p>}
        </div>
        <button className="btn-primary text-sm py-2 px-4" disabled={!product.inStock}>
          {product.inStock ? 'В корзину' : 'Под заказ'}
        </button>
      </div>
    </div>
  );
}

const REVIEWS_DATA = [
  { name:'Анна С.', company:'ООО «Мегатех»', rating:5, date:'15.04.2026', text:'Отличное качество, быстрая доставка. Заказывали 10 штук — все пришли в идеальном состоянии.' },
  { name:'Дмитрий К.', company:'АО «Прогресс»', rating:4, date:'10.04.2026', text:'Хороший продукт за свои деньги. Единственный минус — упаковка могла бы быть лучше.' },
  { name:'Елена В.', company:'ИП Волков', rating:5, date:'02.04.2026', text:'Уже второй раз заказываем у этого поставщика. Всегда чётко, всегда вовремя.' },
];

function ProductDetail({ productId, onBack, onVendorSelect, onAddToCart, cartCount }) {
  const product = PRODUCTS.find(p=>p.id===productId);
  if (!product) return null;
  const vendor = VENDORS[product.vendorId];

  const [activeImage, setActiveImage] = useState(0);
  const [activeVariant, setActiveVariant] = useState(product.variants[product.variants.findIndex(v=>v.inStock)] || product.variants[0]);
  const [qty, setQty] = useState(product.minOrder || 1);
  const [activeTab, setActiveTab] = useState('desc');
  const [wished, setWished] = useState(false);
  const [addedToCart, setAddedToCart] = useState(false);

  const currentPrice = activeVariant.price;
  const bulkPrice = product.bulkPrices.find(b=>qty>=b.from);
  const effectivePrice = bulkPrice ? bulkPrice.price : currentPrice;
  const savings = product.oldPrice ? product.oldPrice - currentPrice : 0;

  function handleAddToCart() {
    onAddToCart();
    setAddedToCart(true);
    setTimeout(()=>setAddedToCart(false), 2500);
  }

  const tabs = [
    { id:'desc', label:'Описание' },
    { id:'specs', label:'Характеристики' },
    { id:'delivery', label:'Доставка' },
    { id:'reviews', label:`Отзывы (${product.reviewCount})` },
  ];

  return (
    <div>
      <div className="max-w-6xl mx-auto px-4 py-4">
        {/* Breadcrumb */}
        <div className="breadcrumb mb-4">
          <a onClick={onBack}>Главная</a>
          <span>/</span>
          <a onClick={onBack}>Поиск</a>
          <span>/</span>
          <span className="text-slate-600 font-medium truncate">{product.shortName}</span>
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
          {/* Gallery */}
          <div className="fade-up">
            <div className="card aspect-square flex items-center justify-center text-8xl mb-3 bg-slate-50">
              {product.images[activeImage]}
            </div>
            <div className="flex gap-2">
              {product.images.map((img,i) => (
                <button key={i}
                  className={`gallery-thumb w-14 h-14 flex items-center justify-center text-2xl bg-slate-50 ${activeImage===i?'active':''}`}
                  onClick={() => setActiveImage(i)}>{img}</button>
              ))}
            </div>
          </div>

          {/* Info */}
          <div className="fade-up space-y-4">
            {/* Tags */}
            <div className="flex flex-wrap gap-2">
              {product.tags.map(tag => (
                <span key={tag} className="text-xs px-2.5 py-1 rounded-full font-semibold"
                  style={tag==='Хит продаж'?{background:'#fef3c7',color:'#92400e'}:{background:'#f1f5f9',color:'#64748b'}}>{tag}</span>
              ))}
            </div>

            <h1 className="text-xl sm:text-2xl font-bold text-slate-900 leading-tight">{product.name}</h1>

            {/* Rating + sku */}
            <div className="flex items-center gap-3 flex-wrap">
              <div className="flex items-center gap-1.5">
                <Stars rating={product.rating} size={14}/>
                <span className="text-sm font-semibold text-slate-700">{product.rating}</span>
                <span className="text-sm text-slate-400">({product.reviewCount} отзывов)</span>
              </div>
              <span className="text-slate-300">·</span>
              <span className="text-xs text-slate-400">Арт: {activeVariant.sku}</span>
              <span className="text-slate-300">·</span>
              <span className="text-xs text-green-600 font-medium flex items-center gap-1">
                {product.inStock ? <><span className="w-1.5 h-1.5 rounded-full bg-green-500"/>В наличии ({product.stockQty} шт.)</> : <span className="text-red-500">Нет в наличии</span>}
              </span>
            </div>

            {/* Vendor */}
            <button className="card p-3 w-full text-left hover:shadow-md transition-all" onClick={onVendorSelect}>
              <div className="flex items-center gap-2.5">
                <div className="w-9 h-9 rounded-lg flex items-center justify-center text-sm font-bold text-white flex-shrink-0" style={{background:vendor.color}}>{vendor.name[0]}</div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-1.5">
                    <p className="text-sm font-semibold text-slate-800">{vendor.name}</p>
                    {vendor.verified && <span className="text-xs px-1.5 py-0.5 rounded font-bold text-white" style={{background:vendor.color, opacity:.9}}>✓</span>}
                  </div>
                  <div className="flex items-center gap-1 mt-0.5">
                    <Stars rating={vendor.rating} size={10}/>
                    <span className="text-xs text-slate-500">{vendor.rating} · {vendor.reviews.toLocaleString('ru')} отзывов</span>
                  </div>
                </div>
                <Ic.chevRight/>
              </div>
            </button>

            {/* Variants */}
            {product.variants.length > 1 && (
              <div>
                <p className="text-sm font-semibold text-slate-700 mb-2">Вариант</p>
                <div className="flex flex-wrap gap-2">
                  {product.variants.map(v => (
                    <button key={v.id}
                      className={`px-3 py-1.5 rounded-lg text-sm font-medium border-2 transition-all ${!v.inStock?'opacity-40 cursor-not-allowed':''}`}
                      style={activeVariant.id===v.id ? {borderColor:'var(--brand,#2455e8)', background:'color-mix(in srgb,var(--brand,#2455e8) 8%,white)', color:'var(--brand,#2455e8)'} : {borderColor:'#e2e8f0', color:'#475569'}}
                      onClick={() => v.inStock && setActiveVariant(v)}
                      disabled={!v.inStock}>
                      {v.label}{!v.inStock && ' (нет)'}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Price */}
            <div className="p-4 rounded-xl border border-slate-100 bg-slate-50">
              <div className="flex items-baseline gap-3 mb-1">
                <span className="text-3xl font-bold text-slate-900">{fmt(effectivePrice)}</span>
                {product.oldPrice && <span className="text-base text-slate-400 line-through">{fmt(product.oldPrice)}</span>}
                {savings > 0 && <span className="text-sm font-bold text-green-600">−{fmt(savings)}</span>}
              </div>
              {bulkPrice && <p className="text-xs text-green-600 mb-1">✓ Оптовая цена от {bulkPrice.from} шт.</p>}
              <p className="text-xs text-slate-500">Без НДС · НДС 20% = {fmt(Math.round(effectivePrice * 0.2))}</p>

              {/* Bulk table */}
              {product.bulkPrices.length > 0 && (
                <div className="mt-3 pt-3 border-t border-slate-200">
                  <p className="text-xs font-semibold text-slate-600 mb-2">Оптовые цены:</p>
                  <div className="space-y-1">
                    <div className="flex justify-between text-xs text-slate-500">
                      <span>1–{product.bulkPrices[0].from-1} шт.</span>
                      <span className="font-medium text-slate-700">{fmt(currentPrice)}</span>
                    </div>
                    {product.bulkPrices.map((bp,i) => (
                      <div key={i} className={`flex justify-between text-xs ${qty>=bp.from?'text-green-700 font-medium':'text-slate-500'}`}>
                        <span>от {bp.from} шт. {qty>=bp.from && '✓'}</span>
                        <span>{fmt(bp.price)}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>

            {/* Qty + add */}
            <div className="flex gap-2">
              <div className="flex items-center rounded-xl border border-slate-200 overflow-hidden">
                <button className="w-10 h-10 flex items-center justify-center text-slate-500 hover:bg-slate-50 transition-colors font-bold text-lg"

                <span className="w-12 text-center font-semibold text-slate-800">{qty}</span>
                <button className="w-10 h-10 flex items-center justify-center text-slate-500 hover:bg-slate-50 transition-colors font-bold text-lg"
                  onClick={()=>setQty(q=>q+1)}>+</button>
              </div>
              <button
                className="btn-primary flex-1 justify-center"
                onClick={handleAddToCart}
                disabled={!product.inStock && !activeVariant.inStock}
                style={addedToCart?{background:'#16a34a', filter:'none'}:{}}>
                {addedToCart ? <><Ic.check size={16}/>Добавлено!</> : <><Ic.cart/>В корзину · {fmt(effectivePrice * qty)}</>}
              </button>
              <button className={`w-10 h-10 rounded-xl border border-slate-200 flex items-center justify-center flex-shrink-0 transition-colors ${wished?'text-red-500 border-red-200 bg-red-50':'text-slate-400 hover:text-red-400'}`}
                onClick={()=>setWished(v=>!v)}>
                <Ic.heart filled={wished}/>
              </button>
            </div>

            {/* Quick info */}
            <div className="grid grid-cols-2 gap-2 text-xs">
              {[
                { icon:<Ic.truck/>, label:'Доставка', val:product.delivery },
                { icon:<Ic.shield/>, label:'Гарантия', val:product.specs['Гарантия']||'По договору' },
                { icon:<Ic.tag/>, label:'Мин. заказ', val:`${product.minOrder} шт.` },
                { icon:<Ic.info/>, label:'Вес', val:product.weight },
              ].map(({icon,label,val},i)=>(
                <div key={i} className="flex items-center gap-2 bg-slate-50 rounded-lg px-3 py-2">
                  <span className="text-slate-400">{icon}</span>
                  <div>
                    <p className="text-slate-400">{label}</p>
                    <p className="font-medium text-slate-700">{val}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Tabs */}
        <div className="card overflow-hidden fade-up">
          <div className="flex border-b border-slate-100 overflow-x-auto">
            {tabs.map(t => (
              <button key={t.id} className={`tab-btn ${activeTab===t.id?'active':''}`}
                onClick={()=>setActiveTab(t.id)}>{t.label}</button>
            ))}
          </div>
          <div className="p-5">
            {activeTab==='desc' && (
              <div>
                <p className="text-sm text-slate-600 leading-relaxed">{product.description}</p>
                <div className="mt-4 flex flex-wrap gap-2">
                  {product.tags.map(tag => (
                    <span key={tag} className="text-xs px-2.5 py-1 rounded-full bg-slate-100 text-slate-600 font-medium">{tag}</span>
                  ))}
                </div>
              </div>
            )}
            {activeTab==='specs' && (
              <div className="divide-y divide-slate-50">
                {Object.entries(product.specs).map(([k,v])=>(
                  <div key={k} className="flex py-2.5 gap-4">
                    <span className="text-sm text-slate-500 w-40 flex-shrink-0">{k}</span>
                    <span className="text-sm font-medium text-slate-800">{v}</span>
                  </div>
                ))}
              </div>
            )}
            {activeTab==='delivery' && (
              <div className="space-y-4">
                <div className="flex items-start gap-3 p-3 bg-green-50 rounded-xl">
                  <span className="text-xl">📦</span>
                  <div>
                    <p className="text-sm font-semibold text-green-800">Стандартная доставка</p>
                    <p className="text-xs text-green-700 mt-0.5">{product.delivery} · Бесплатно от 50 000 ₽</p>
                  </div>
                </div>
                <div className="flex items-start gap-3 p-3 bg-blue-50 rounded-xl">
                  <span className="text-xl">⚡</span>
                  <div>
                    <p className="text-sm font-semibold text-blue-800">Экспресс доставка</p>
                    <p className="text-xs text-blue-700 mt-0.5">1–2 рабочих дня · 2 500 ₽</p>
                  </div>
                </div>
                <div className="flex items-start gap-3 p-3 bg-slate-50 rounded-xl">
                  <span className="text-xl">🏪</span>
                  <div>
                    <p className="text-sm font-semibold text-slate-700">Самовывоз</p>
                    <p className="text-xs text-slate-500 mt-0.5">Бесплатно · 3 пункта в Москве</p>
                  </div>
                </div>
              </div>
            )}
            {activeTab==='reviews' && (
              <div className="space-y-4">
                <div className="flex items-center gap-6 mb-5">
                  <div className="text-center">
                    <p className="text-5xl font-bold text-slate-900">{product.rating}</p>
                    <Stars rating={product.rating} size={16}/>
                    <p className="text-xs text-slate-400 mt-1">{product.reviewCount} отзывов</p>
                  </div>
                  <div className="flex-1 space-y-1.5">
                    {[5,4,3,2,1].map(s=>{
                      const pct = s===5?68:s===4?22:s===3?7:2;
                      return (
                        <div key={s} className="flex items-center gap-2">
                          <span className="text-xs text-slate-500 w-4">{s}★</span>
                          <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                            <div className="h-full rounded-full" style={{width:`${pct}%`,background:'#f59e0b'}}/>
                          </div>
                          <span className="text-xs text-slate-400 w-6">{pct}%</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
                {REVIEWS_DATA.map((r,i)=>(
                  <div key={i} className="border-b border-slate-50 pb-4 last:border-0">
                    <div className="flex items-start justify-between gap-2 mb-2">
                      <div>
                        <p className="text-sm font-semibold text-slate-800">{r.name} <span className="text-slate-400 font-normal">· {r.company}</span></p>
                        <div className="flex items-center gap-1 mt-0.5"><Stars rating={r.rating} size={11}/></div>
                      </div>
                      <span className="text-xs text-slate-400 flex-shrink-0">{r.date}</span>
                    </div>
                    <p className="text-sm text-slate-600 leading-relaxed">{r.text}</p>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        {/* Related products */}
        <div className="mt-6">
          <h3 className="text-base font-bold text-slate-900 mb-3">Похожие товары</h3>
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
            {PRODUCTS.filter(p=>p.id!==productId && p.category===product.category).slice(0,4).map(p=>(
              <div key={p.id} className="product-card" onClick={()=>{}}>
                <div className="h-20 flex items-center justify-center text-3xl bg-slate-50 border-b border-slate-100">{p.image}</div>
                <div className="p-2.5">
                  <p className="text-xs font-semibold text-slate-700 leading-snug mb-1 line-clamp-2">{p.shortName}</p>
                  <p className="text-sm font-bold" style={{color:'var(--brand,#2455e8)'}}>{fmt(p.price)}</p>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Sticky bar */}
      <div className="sticky-cart">
        <div className="flex-1 min-w-0">
          <p className="text-sm font-semibold text-slate-800 truncate">{product.shortName}</p>
          <p className="text-base font-bold" style={{color:'var(--brand,#2455e8)'}}>{fmt(effectivePrice * qty)}</p>
        </div>
        <div className="flex items-center gap-2">
          <div className="flex items-center rounded-lg border border-slate-200 overflow-hidden">
            <button className="w-8 h-8 flex items-center justify-center text-slate-500 hover:bg-slate-50 font-bold"
              onClick={()=>setQty(q=>Math.max(product.minOrder,q-1))}>−</button>
            <span className="w-8 text-center text-sm font-semibold">{qty}</span>
            <button className="w-8 h-8 flex items-center justify-center text-slate-500 hover:bg-slate-50 font-bold"
              onClick={()=>setQty(q=>q+1)}>+</button>
          </div>
          <button className="btn-primary text-sm py-2.5" onClick={handleAddToCart}
            style={addedToCart?{background:'#16a34a', filter:'none'}:{}}
            disabled={!product.inStock}>
            {addedToCart ? '✓ Добавлено' : 'В корзину'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// SCREEN 4 — VENDOR PROFILE
// ═══════════════════════════════════════════════════════════════════════════════

function VendorProfile({ vendorId, onBack, onSelectProduct }) {
  const vendor = VENDORS[vendorId];
  if (!vendor) return null;
  const vendorProducts = PRODUCTS.filter(p=>p.vendorId===vendorId);
  const [activeTab, setActiveTab] = useState('products');

  const tabs = [
    { id:'products', label:`Товары (${vendorProducts.length})` },
    { id:'about', label:'О компании' },
    { id:'reviews', label:'Отзывы' },
  ];

  return (
    <div className="max-w-6xl mx-auto px-4 py-5 fade-up">
      {/* Header */}
      <div className="card p-5 mb-4">
        <div className="flex items-start gap-4 flex-wrap">
          <div className="w-16 h-16 rounded-2xl flex items-center justify-center text-2xl font-bold text-white flex-shrink-0" style={{background:vendor.color}}>
            {vendor.name[0]}
          </div>
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2 flex-wrap mb-1">
              <h1 className="text-xl font-bold text-slate-900">{vendor.name}</h1>
              {vendor.verified && (
                <span className="text-xs px-2 py-0.5 rounded-full font-bold text-white" style={{background:vendor.color}}>✓ Верифицирован</span>
              )}
            </div>
            <p className="text-sm text-slate-500 mb-3">{vendor.desc}</p>
            <div className="flex flex-wrap gap-4">
              {[
                { label:'Рейтинг', val:<><span className="font-bold">{vendor.rating}</span> <Stars rating={vendor.rating} size={12}/></> },
                { label:'Отзывов', val:vendor.reviews.toLocaleString('ru') },
                { label:'Заказов', val:vendor.orders.toLocaleString('ru') },
                { label:'На платформе', val:`с ${vendor.since} г.` },
              ].map(({label,val},i)=>(
                <div key={i} className="text-sm">
                  <span className="text-slate-400">{label}: </span>
                  <span className="font-semibold text-slate-800">{val}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="flex flex-col gap-2">
            <button className="btn-primary text-sm py-2 px-4">💬 Написать</button>
            <button className="btn-ghost text-sm py-2 px-4">📋 Запрос КП</button>
          </div>
        </div>

        {/* Stats */}
        <div className="grid grid-cols-3 gap-3 mt-4 pt-4 border-t border-slate-100">
          {[
            { icon:'⭐', val:`${vendor.rating}/5`, label:'Средний рейтинг' },
            { icon:'📦', val:`${vendor.orders.toLocaleString('ru')}+`, label:'Выполненных заказов' },
            { icon:'🚚', val:'98%', label:'Своевременная доставка' },
          ].map(({icon,val,label},i)=>(
            <div key={i} className="text-center p-3 bg-slate-50 rounded-xl">
              <div className="text-xl mb-1">{icon}</div>
              <p className="text-base font-bold text-slate-900">{val}</p>
              <p className="text-xs text-slate-500">{label}</p>
            </div>
          ))}
        </div>
      </div>

      {/* Tabs */}
      <div className="card overflow-hidden">
        <div className="flex border-b border-slate-100">
          {tabs.map(t=>(
            <button key={t.id} className={`tab-btn ${activeTab===t.id?'active':''}`}
              onClick={()=>setActiveTab(t.id)}>{t.label}</button>
          ))}
        </div>
        <div className="p-5">
          {activeTab==='products' && (
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
              {vendorProducts.map((p,i)=>(
                <ProductCard key={p.id} product={p} idx={i} onSelect={()=>onSelectProduct(p.id)} onVendorSelect={()=>{}}/>
              ))}
            </div>
          )}
          {activeTab==='about' && (
            <div className="space-y-4">
              <p className="text-sm text-slate-600 leading-relaxed">{vendor.desc}</p>
              <div className="grid grid-cols-2 gap-3">
                {[
                  { label:'Год основания', val:vendor.since },
                  { label:'Статус', val:vendor.verified?'Верифицированный':'Не верифицирован' },
                  { label:'Минимальный заказ', val:'По товару' },
                  { label:'Время ответа', val:'< 2 часов' },
                ].map(({label,val},i)=>(
                  <div key={i} className="bg-slate-50 rounded-xl p-3">
                    <p className="text-xs text-slate-500">{label}</p>
                    <p className="text-sm font-semibold text-slate-800 mt-0.5">{val}</p>
                  </div>
                ))}
              </div>
              <div className="bg-blue-50 rounded-xl p-4">
                <p className="text-sm font-semibold text-blue-800 mb-2">Преимущества</p>
                <ul className="space-y-1.5">
                  {['Официальный дистрибьютор', 'Гарантия производителя', 'Электронный документооборот', 'Кредитная линия для корпоративных клиентов'].map((item,i)=>(
                    <li key={i} className="flex items-center gap-2 text-xs text-blue-700">
                      <span className="w-4 h-4 rounded-full bg-blue-200 flex items-center justify-center flex-shrink-0"><Ic.check size={10}/></span>
                      {item}
                    </li>
                  ))}
                </ul>
              </div>
            </div>
          )}
          {activeTab==='reviews' && (
            <div className="space-y-4">
              {REVIEWS_DATA.concat(REVIEWS_DATA).slice(0,4).map((r,i)=>(
                <div key={i} className="border-b border-slate-50 pb-4 last:border-0">
                  <div className="flex items-start justify-between mb-2">
                    <div>
                      <p className="text-sm font-semibold text-slate-800">{r.name} <span className="text-slate-400 font-normal">· {r.company}</span></p>
                      <div className="flex items-center gap-1 mt-0.5"><Stars rating={r.rating} size={11}/></div>
                    </div>
                    <span className="text-xs text-slate-400">{r.date}</span>
                  </div>
                  <p className="text-sm text-slate-600">{r.text}</p>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════════════════════════

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#2455e8",
  "defaultView": "grid",
  "showBulkPrices": true,
  "currency": "RUB",
  "productsPerRow": "3"
}/*EDITMODE-END*/;

function App() {
  const hookResult = window.useTweaks ? window.useTweaks(TWEAK_DEFAULTS) : {};
  const tweaks = (hookResult && hookResult.tweaks) || TWEAK_DEFAULTS;
  const TweaksPanel = (hookResult && hookResult.TweaksPanel) || window.TweaksPanel;
  const TweakSection = (hookResult && hookResult.TweakSection) || window.TweakSection;
  const TweakColor = (hookResult && hookResult.TweakColor) || window.TweakColor;
  const TweakToggle = (hookResult && hookResult.TweakToggle) || window.TweakToggle;
  const TweakSelect = (hookResult && hookResult.TweakSelect) || window.TweakSelect;

  const [screen, setScreen] = useState('home');       // home | results | product | vendor
  const [searchQuery, setSearchQuery] = useState('');
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [selectedVendor, setSelectedVendor] = useState(null);
  const [initialCategory, setInitialCategory] = useState(null);
  const [cartCount, setCartCount] = useState(0);
  const [history, setHistory] = useState([]);

  useEffect(() => {
    document.documentElement.style.setProperty('--brand', tweaks.accentColor || '#2455e8');
  }, [tweaks.accentColor]);

  function push(nextScreen) {
    setHistory(h => [...h, screen]);
    setScreen(nextScreen);
  }

  function goBack() {
    setHistory(h => {
      const prev = [...h];
      const last = prev.pop();
      setScreen(last || 'home');
      return prev;
    });
  }

  function handleSearch(q) {
    setSearchQuery(q);
    setInitialCategory(null);
    push('results');
  }

  function handleCategorySelect(cat) {
    setSearchQuery('');
    setInitialCategory(cat);
    push('results');
  }

  function handleSelectProduct(id) {
    setSelectedProduct(id);
    push('product');
  }

  function handleSelectVendor(id) {
    setSelectedVendor(id);
    push('vendor');
  }

  return (
    <div style={{'--brand': tweaks.accentColor || '#2455e8'}}>
      <Navbar
        cartCount={cartCount}
        searchQuery={searchQuery}
        onSearchChange={setSearchQuery}
        onSearch={handleSearch}
        onCartClick={() => {}}
      />
      <main>
        {screen === 'home' && (
          <HomeScreen onSearch={handleSearch} onCategorySelect={handleCategorySelect} />
        )}
        {screen === 'results' && (
          <SearchResults
            query={searchQuery}
            initialCategory={initialCategory}
            onSelectProduct={handleSelectProduct}
            onSelectVendor={handleSelectVendor}
          />
        )}
        {screen === 'product' && selectedProduct && (
          <ProductDetail
            productId={selectedProduct}
            onBack={goBack}
            onVendorSelect={() => handleSelectVendor(PRODUCTS.find(p=>p.id===selectedProduct)?.vendorId)}
            onAddToCart={() => setCartCount(c => c + 1)}
            cartCount={cartCount}
          />
        )}
        {screen === 'vendor' && selectedVendor && (
          <VendorProfile
            vendorId={selectedVendor}
            onBack={goBack}
            onSelectProduct={handleSelectProduct}
          />
        )}
      </main>

      {TweaksPanel && TweakSection && (
        <TweaksPanel>
          <TweakSection title="Брендинг">
            {TweakColor && <TweakColor id="accentColor" label="Цвет акцента" />}
          </TweakSection>
          <TweakSection title="Каталог">
            {TweakSelect && <TweakSelect id="defaultView" label="Вид по умолчанию" options={[
              { value:'grid', label:'Сетка' },
              { value:'list', label:'Список' },
            ]} />}
            {TweakToggle && <TweakToggle id="showBulkPrices" label="Оптовые цены" />}
          </TweakSection>
        </TweaksPanel>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
