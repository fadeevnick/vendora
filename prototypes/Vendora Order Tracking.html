    .fade-up { animation: fadeUp 0.28s cubic-bezier(.22,.84,.4,1) both; }

    @keyframes slideIn { from { opacity: 0; transform: translateX(18px); } to { opacity: 1; transform: translateX(0); } }
    .slide-in { animation: slideIn 0.28s cubic-bezier(.22,.84,.4,1) both; }

    .card { background: #fff; border-radius: 14px; border: 1px solid #e4e9f2; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
    .soft-card { background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%); border: 1px solid #e7edf7; border-radius: 16px; }

    .btn-primary {
      background: var(--brand,#2455e8);
      color: #fff;
      border: none;
      border-radius: 9px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: filter .15s, box-shadow .15s, transform .1s;
    }
    .btn-primary:hover { filter: brightness(.88); box-shadow: 0 4px 14px color-mix(in srgb, var(--brand,#2455e8) 30%, transparent); }

    .btn-primary:disabled { opacity: .5; cursor: not-allowed; filter: none; box-shadow: none; }

    .btn-ghost {
      background: transparent;
      color: #64748b;
      border: 1.5px solid #e2e8f0;
      border-radius: 9px;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;

    .btn-ghost:hover { border-color: #94a3b8; color: #1e293b; background: #f8fafc; }

      font-size: 13px;
      font-weight: 500;

      align-items: center;

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1.5px solid #e2e8f0;
      background: #fff;
      color: #64748b;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .chip.active {
      color: var(--brand,#2455e8);
      border-color: var(--brand,#2455e8);
      background: color-mix(in srgb, var(--brand,#2455e8) 8%, white);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .02em;
    }

    .order-row {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) auto auto auto;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid #f1f4f9;
      cursor: pointer;
      transition: background .12s;
    }
    .order-row:hover { background: #f8fafc; }
    .order-row:last-child { border-bottom: none; }
    .order-row.active { background: color-mix(in srgb, var(--brand,#2455e8) 5%, white); }

    .timeline-row {
      display: flex;
      gap: 12px;
      padding-bottom: 16px;
      position: relative;
    }
    .timeline-row:last-child { padding-bottom: 0; }
    .timeline-row:last-child .timeline-line { display: none; }

    .timeline-dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .timeline-line {
      position: absolute;
      left: 14px;
      top: 30px;
      bottom: 0;
      width: 2px;
      background: #e2e8f0;
    }

    .stat-card { background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%); border: 1px solid #e7edf7; border-radius: 14px; padding: 16px 18px; }

    .notice {
      border-radius: 14px;
      padding: 14px 16px;
      border: 1px solid;
    }

    .progress-track {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .progress-step {
      position: relative;
      padding: 10px 10px 12px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
    }
    .progress-step.active {
      color: var(--brand,#2455e8);
      border-color: color-mix(in srgb, var(--brand,#2455e8) 24%, white);
      background: color-mix(in srgb, var(--brand,#2455e8) 7%, white);
    }
    .progress-step.done {
      color: #166534;
      border-color: #bbf7d0;
      background: #f0fdf4;
    }

    .email-row {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #eef2f7;
    }
    .email-row:last-child { border-bottom: none; }

    @media(max-width: 1024px) {
      .tracking-layout { grid-template-columns: 1fr; }
    }

    @media(max-width: 768px) {
      .order-row { grid-template-columns: 1fr auto; }
      .order-row .hide-mobile { display: none; }
      .progress-track { grid-template-columns: 1fr; }
    }

      {s.short}
    </span>
  );
}

function progressState(step, current) {
  const stepIndex = STATUS_FLOW.indexOf(step);
  const currentIndex = STATUS_FLOW.indexOf(current);
  if (current === 'disputed' || current === 'cancelled') {
    const lastStable = current === 'disputed' ? 'delivered' : 'payment_held';
    const stableIndex = STATUS_FLOW.indexOf(lastStable);
    return stepIndex <= stableIndex ? 'done' : '';
  }
  if (stepIndex < currentIndex) return 'done';
  if (stepIndex === currentIndex) return 'active';
  return '';
}

function App() {
  const tweakApi = window.useTweaks ? window.useTweaks(TWEAK_DEFAULTS) : null;
  const [tweaks, setTweak] = Array.isArray(tweakApi) ? tweakApi : [TWEAK_DEFAULTS, () => {}];
  const TweaksPanel = window.TweaksPanel;
  const TweakSection = window.TweakSection;
  const TweakColor = window.TweakColor;
  const TweakText = window.TweakText;
  const TweakToggle = window.TweakToggle;
  const TweakSelect = window.TweakSelect;

  const [screen, setScreen] = useState('list');
  const [orders, setOrders] = useState(makeOrders);
  const [selectedId, setSelectedId] = useState(TWEAK_DEFAULTS.defaultOrderId);
  const [activeFilter, setActiveFilter] = useState('all');
  const [showNotifications, setShowNotifications] = useState(!!tweaks.showNotifications);

  useEffect(() => {
    document.documentElement.style.setProperty('--brand', tweaks.accentColor || '#2455e8');
  }, [tweaks.accentColor]);

  useEffect(() => {
    setShowNotifications(!!tweaks.showNotifications);
  }, [tweaks.showNotifications]);

  useEffect(() => {
    if (tweaks.defaultOrderId && orders.some((order) => order.id === tweaks.defaultOrderId)) {
      setSelectedId(tweaks.defaultOrderId);
    }
  }, [tweaks.defaultOrderId, orders]);

  const selectedOrder = orders.find((order) => order.id === selectedId) || orders[0];
  const completedCount = orders.filter((order) => order.status === 'completed').length;

  function openOrder(id) {
    setSelectedId(id);
    setScreen('detail');
  }

  function confirmReceipt(id) {
    setOrders((prev) => prev.map((order) => {
      if (order.id !== id) return order;
      return {
        ...order,
        status: 'completed',
        updatedAt: '07.05.2026 14:22',
        escrow: 'Средства подтверждены buyer и стали releasable для payout.',
        disputeWindow: 'истекло после подтверждения',
        deliveryNote: 'Buyer подтвердил получение без открытия спора.',
        timeline: [
          ...order.timeline,
          { state: 'completed', title: 'Buyer подтвердил получение', time: '07.05.2026 14:22', note: 'Заказ закрыт successfully.' },
        ],
        notifications: [
          ...order.notifications,
          { id: `${order.id}-complete`, subject: 'Заказ завершён', sentAt: '07.05.2026 14:23', body: 'Спасибо за подтверждение. Заказ переведён в COMPLETED.' },
        ],
      };
    }));
    setScreen('complete');
  }

  function continueToDispute(id) {
    setSelectedId(id);
    setScreen('dispute');
  }

  return (
    <div style={{ '--brand': tweaks.accentColor || '#2455e8' }}>
      <Header
        screen={screen}
        onBack={screen === 'detail' || screen === 'complete' || screen === 'dispute' ? (() => setScreen(screen === 'detail' ? 'list' : 'detail')) : null}
        brandName={tweaks.brandName || 'Vendora'}
        buyerName={tweaks.buyerName || 'ООО «ТехноСтарт»'}
        showNotifications={screen === 'detail' && !!tweaks.showNotifications}
        onNotifications={() => setShowNotifications((prev) => !prev)}
        completedCount={completedCount}
      />

      <main className="max-w-7xl mx-auto px-4 py-6 pb-16">
        {screen === 'list' && (
          <OrdersList
            orders={orders}
            activeFilter={activeFilter}
            setActiveFilter={setActiveFilter}
            selectedId={selectedId}
            onSelect={openOrder}
          />
        )}

        {screen === 'detail' && selectedOrder && (
          <OrderDetail
            order={selectedOrder}
            showTimeline={!!tweaks.showTimeline}
            showNotifications={showNotifications}
            onBack={() => setScreen('list')}
            onConfirmReceipt={confirmReceipt}
            onOpenDispute={continueToDispute}
            onCloseNotifications={() => setShowNotifications(false)}
          />
        )}

        {screen === 'complete' && selectedOrder && (
          <CompletionScreen
            order={selectedOrder}
            onBackToOrder={() => setScreen('detail')}
            onBackToList={() => setScreen('list')}
          />
        )}

        {screen === 'dispute' && selectedOrder && (
          <DisputeHandoff
            order={selectedOrder}
            onBack={() => setScreen('detail')}
            onContinue={() => window.location.href = 'Vendora Dispute Flow.html'}
          />
        )}
      </main>

      {TweaksPanel && TweakSection && TweakColor && TweakText && TweakToggle && TweakSelect && (
        <TweaksPanel title="B-4 Tweaks">
          <TweakSection label="Брендинг">
            <TweakColor label="Цвет акцента" value={tweaks.accentColor} onChange={(value) => setTweak('accentColor', value)} />
            <TweakText label="Бренд" value={tweaks.brandName} onChange={(value) => setTweak('brandName', value)} />
            <TweakText label="Buyer name" value={tweaks.buyerName} onChange={(value) => setTweak('buyerName', value)} />
          </TweakSection>
          <TweakSection label="Экран">
            <TweakToggle label="Показывать timeline" value={!!tweaks.showTimeline} onChange={(value) => setTweak('showTimeline', value)} />
            <TweakToggle label="Показывать уведомления" value={!!tweaks.showNotifications} onChange={(value) => setTweak('showNotifications', value)} />
            <TweakSelect
              label="Стартовый заказ"
              value={tweaks.defaultOrderId}
              options={[
                { value: 'VND-8821-A', label: 'Delivered / confirmable' },
                { value: 'VND-8818-A', label: 'Shipped' },
                { value: 'VND-8812-A', label: 'Payment held' },
                { value: 'VND-8809-A', label: 'Completed' },
                { value: 'VND-8803-A', label: 'Disputed' },
              ]}
              onChange={(value) => setTweak('defaultOrderId', value)}
            />
          </TweakSection>
        </TweaksPanel>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
