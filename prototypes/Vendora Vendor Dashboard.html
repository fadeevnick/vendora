<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendora — Vendor Dashboard</title>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: #f1f4f9; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp 0.28s cubic-bezier(.22,.84,.4,1) both; }

    @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
    .slide-in { animation: slideIn 0.3s cubic-bezier(.22,.84,.4,1) both; }

    @keyframes spin { to{transform:rotate(360deg)} }
    .spinner { animation: spin 0.7s linear infinite; }

    @keyframes pop { 0%{transform:scale(.8);opacity:0} 70%{transform:scale(1.06)} 100%{transform:scale(1);opacity:1} }
    .pop { animation: pop 0.35s cubic-bezier(.22,.84,.4,1) both; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
    .pulse-dot { animation: pulse 1.8s ease infinite; }

    .card { background:#fff; border-radius:14px; border:1px solid #e4e9f2; box-shadow:0 1px 3px rgba(0,0,0,.05); }

    .btn-primary {
      background: var(--brand,#2455e8); color:#fff; border:none; border-radius:9px;
      padding:9px 18px; font-size:13px; font-weight:600; font-family:inherit; cursor:pointer;
      display:inline-flex; align-items:center; gap:7px;
      transition: filter .15s, box-shadow .15s, transform .1s;
    }
    .btn-primary:hover { filter:brightness(.88); box-shadow:0 4px 14px color-mix(in srgb,var(--brand,#2455e8) 30%,transparent); }
    .btn-primary:active { transform:scale(.97); }
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; filter:none; box-shadow:none; }

    .btn-ghost {
      background:transparent; color:#64748b; border:1.5px solid #e2e8f0;
      border-radius:9px; padding:8px 16px; font-size:13px; font-weight:500; font-family:inherit;
      cursor:pointer; display:inline-flex; align-items:center; gap:6px;
      transition: border-color .15s, color .15s, background .15s;
    }
    .btn-ghost:hover { border-color:#94a3b8; color:#1e293b; background:#f8fafc; }

    .btn-danger {
      background:#fff; color:#ef4444; border:1.5px solid #fecaca;
      border-radius:9px; padding:8px 16px; font-size:13px; font-weight:500; font-family:inherit;
      cursor:pointer; display:inline-flex; align-items:center; gap:6px;
      transition: background .15s, border-color .15s;
    }
    .btn-danger:hover { background:#fef2f2; border-color:#ef4444; }

    .input-field {
      width:100%; padding:8px 12px; border:1.5px solid #e2e8f0; border-radius:9px;
      font-size:13px; font-family:inherit; background:#fff; color:#1e293b;
      transition:border-color .15s, box-shadow .15s; outline:none;
    }
    .input-field:focus { border-color:var(--brand,#2455e8); box-shadow:0 0 0 3px color-mix(in srgb,var(--brand,#2455e8) 12%,transparent); }

    .nav-item {
      display:flex; align-items:center; gap:10px; padding:9px 12px;
      border-radius:9px; font-size:13px; font-weight:500; color:#64748b;
      cursor:pointer; transition:background .15s, color .15s; white-space:nowrap;
    }
    .nav-item:hover { background:#f1f4f9; color:#1e293b; }
    .nav-item.active { background:color-mix(in srgb,var(--brand,#2455e8) 10%,white); color:var(--brand,#2455e8); font-weight:600; }

    .status-badge {
      display:inline-flex; align-items:center; gap:5px;
      padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:.02em;
    }

    .order-row {
      display:grid; align-items:center; gap:12px; padding:14px 16px;
      border-bottom:1px solid #f1f4f9; cursor:pointer;
      transition:background .12s;
      grid-template-columns: 1fr auto auto auto auto;
    }
    .order-row:hover { background:#f8fafc; }
    .order-row:last-child { border-bottom:none; }

    .timeline-dot {
      width:32px; height:32px; border-radius:50%; display:flex; align-items:center;
      justify-content:center; font-size:14px; flex-shrink:0; position:relative; z-index:1;
    }

    .stat-card { background:#fff; border-radius:14px; border:1px solid #e4e9f2; padding:16px 18px; }

    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }

    @media(max-width:768px) {
      .sidebar { display:none; }
      .order-row { grid-template-columns:1fr auto; }
      .order-row .hide-mobile { display:none; }
    }
  </style>
</head>
<body>
<div id="root"></div>

// ─── HELPERS ─────────────────────────────────────────────────────────────────

const fmt = n => new Intl.NumberFormat('ru-RU').format(n) + ' ₽';
const orderTotal = order => order.items.reduce((s,i) => s + i.price*i.qty, 0);

// ─── ICONS ───────────────────────────────────────────────────────────────────

const Ic = {
  chevronRight: () => <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  chevronLeft: () => <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L6 8l4 5" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  search: () => <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" strokeWidth="1.5"/><path d="M10 10l3 3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
  filter: () => <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2 4h11M4.5 8h6M7 12h1" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
  refresh: () => <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M12 2v4H8M2 12V8h4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/><path d="M12 6A6 6 0 102 8" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
  check: ({ size=14 }) => <svg width={size} height={size} viewBox="0 0 14 14" fill="none"><path d="M2.5 7l3 3L11.5 4" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>,

  bell: ({ n }) => <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2a5 5 0 015 5v3l1.5 2H2.5L4 10V7a5 5 0 015-5z" stroke="currentColor" strokeWidth="1.4"/><path d="M7 14a2 2 0 004 0" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>,
  menu: () => <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 5h14M2 9h14M2 13h14" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
  cancel: () => <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>,
  box: () => <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L1 4v6l6 3 6-3V4L7 1z" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/><path d="M1 4l6 3m0 0l6-3M7 7v6" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/></svg>,
  print: () => <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="5" width="10" height="7" rx="1" stroke="currentColor" strokeWidth="1.3"/><path d="M4 5V3a1 1 0 011-1h4a1 1 0 011 1v2" stroke="currentColor" strokeWidth="1.3"/><path d="M4 9h6M4 11h4" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/></svg>,
  chat: () => <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2h10a1 1 0 011 1v6a1 1 0 01-1 1H5L2 13V3a1 1 0 011-1z" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>,
};

// ─── STATUS BADGE ─────────────────────────────────────────────────────────────

function StatusBadge({ status }) {
  const s = STATUSES[status];
  if (!s) return null;
  return (
    <span className="status-badge" style={{background: s.bg, color: s.color}}>
      <span className="w-1.5 h-1.5 rounded-full" style={{background: s.color}}></span>
      {s.label}
    </span>
  );
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────

    { id:'reviews', label:'Отзывы', icon:'⭐', badge:null },
    { id:'settings', label:'Настройки', icon:'⚙️', badge:null },
  ];
  return (
    <aside className="sidebar w-52 flex-shrink-0 flex flex-col bg-white border-r border-slate-100 min-h-screen pt-4 pb-8">
      {/* Logo */}
      <div className="px-4 mb-6 flex items-center gap-2.5">
        <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:'var(--brand,#2455e8)'}}>
          <span className="text-white font-bold text-sm">V</span>
        </div>
        <div>
          <p className="text-sm font-bold text-slate-800">Vendora</p>
          <p className="text-xs text-slate-400">Seller Portal</p>
        </div>
      </div>

      {/* Vendor info */}
      <div className="mx-3 mb-5 p-3 rounded-xl bg-slate-50 border border-slate-100">
        <div className="flex items-center gap-2.5">
          <div className="w-8 h-8 rounded-lg flex items-center justify-center text-sm font-bold flex-shrink-0" style={{background:'#6366f1', color:'#fff'}}>T</div>
          <div className="min-w-0">
            <p className="text-xs font-semibold text-slate-800 truncate">TechPro Solutions</p>
            <p className="text-xs text-green-600 flex items-center gap-1">
              <span className="w-1.5 h-1.5 rounded-full bg-green-500 pulse-dot"></span>Верифицирован
            </p>
          </div>
        </div>
      </div>

      {/* Nav */}
      <nav className="px-3 space-y-0.5 flex-1">
        {navItems.map(item => (
          <div key={item.id}
            className={`nav-item ${activeView.startsWith(item.id) ? 'active' : ''}`}

            <span className="text-base">{item.icon}</span>
            <span className="flex-1">{item.label}</span>
            {item.badge && (

                {item.badge}
              </span>
            )}
          </div>
        ))}
      </nav>

      {/* Help */}
      <div className="px-3 mt-4">
        <div className="nav-item text-slate-400">
          <span className="text-base">💬</span>
          <span>Поддержка</span>
        </div>
      </div>
    </aside>

}

// ─── TOP BAR ─────────────────────────────────────────────────────────────────

function TopBar({ title, subtitle, onBack, newCount }) {
  return (
    <div className="bg-white border-b border-slate-100 px-5 py-3.5 flex items-center gap-3 sticky top-0 z-30">
      {onBack && (
        <button className="btn-ghost px-2.5 py-2" onClick={onBack}><Ic.chevronLeft /></button>
      )}
      <div className="flex-1 min-w-0">
        <h1 className="text-base font-bold text-slate-900 truncate">{title}</h1>
        {subtitle && <p className="text-xs text-slate-500 mt-0.5">{subtitle}</p>}
      </div>
      <div className="flex items-center gap-2">
        <button className="relative w-8 h-8 rounded-lg bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-100 transition-colors">
          <Ic.bell />
          {newCount > 0 && <span className="absolute -top-1 -right-1 w-4 h-4 rounded-full text-white text-xs flex items-center justify-center font-bold" style={{background:'var(--brand,#2455e8)', fontSize:'10px'}}>{newCount}</span>}
        </button>
        <div className="w-8 h-8 rounded-lg bg-slate-200 flex items-center justify-center text-xs font-bold text-slate-600">ИВ</div>
      </div>
    </div>
  );
}

// ─── STATS ROW ────────────────────────────────────────────────────────────────

function StatsRow({ orders }) {
  const byStatus = STATUS_FLOW.reduce((acc, s) => ({ ...acc, [s]: orders.filter(o=>o.status===s).length }), {});
  const revenue = orders.filter(o=>o.status==='delivered').reduce((s,o)=>s+orderTotal(o),0);
  const pending = orders.filter(o=>['new','accepted','assembling'].includes(o.status)).reduce((s,o)=>s+orderTotal(o),0);

  const stats = [
    { label:'Новых заказов', value: byStatus.new || 0, color:'#f59e0b', icon:'🔔', urgent: (byStatus.new||0) > 0 },
    { label:'В сборке', value: byStatus.assembling || 0, color:'#0891b2', icon:'📦' },
    { label:'В пути', value: byStatus.shipped || 0, color:'#7c3aed', icon:'🚚' },
    { label:'Выручка (месяц)', value: fmt(revenue), color:'#16a34a', icon:'💰', isText:true },
    { label:'Ожидает оплаты', value: fmt(pending), color:'#6366f1', icon:'⏳', isText:true },
  ];

  return (
    <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 p-4">
      {stats.map((s, i) => (
        <div key={i} className={`stat-card ${s.urgent ? 'ring-2' : ''}`} style={s.urgent ? {'--tw-ring-color':s.color+'40', boxShadow:`0 0 0 2px ${s.color}30`} : {}}>
          <div className="flex items-start justify-between mb-2">
            <span className="text-xl">{s.icon}</span>
            {s.urgent && <span className="pulse-dot w-2 h-2 rounded-full flex-shrink-0 mt-1" style={{background:s.color}}></span>}
          </div>
          <p className="text-lg font-bold" style={{color: s.urgent ? s.color : '#1e293b'}}>{s.value}</p>
          <p className="text-xs text-slate-500 mt-0.5 leading-tight">{s.label}</p>
        </div>
      ))}
    </div>
  );
}

// ─── ORDERS LIST ─────────────────────────────────────────────────────────────

function OrdersList({ orders, setOrders, onSelect, tweaks }) {
  const [search, setSearch] = useState('');
  const [filterStatus, setFilterStatus] = useState('all');
  const [sortBy, setSortBy] = useState('date');
  const [refreshing, setRefreshing] = useState(false);

  const newCount = orders.filter(o=>o.status==='new').length;

  async function handleRefresh() {
    setRefreshing(true);
    await new Promise(r => setTimeout(r, 800));
    setRefreshing(false);
  }

  const filtered = orders
    .filter(o => filterStatus === 'all' || o.status === filterStatus)
    .filter(o => !search || o.id.toLowerCase().includes(search.toLowerCase()) || o.buyerName.toLowerCase().includes(search.toLowerCase()))
    .sort((a, b) => {
      if (sortBy === 'date') return b.id.localeCompare(a.id);
      if (sortBy === 'amount') return orderTotal(b) - orderTotal(a);
      return 0;
    });

  const tabs = [
    { id:'all', label:'Все', count: orders.length },
    { id:'new', label:'Новые', count: orders.filter(o=>o.status==='new').length },
    { id:'accepted', label:'Принятые', count: orders.filter(o=>o.status==='accepted').length },
    { id:'assembling', label:'Сборка', count: orders.filter(o=>o.status==='assembling').length },
    { id:'shipped', label:'В пути', count: orders.filter(o=>o.status==='shipped').length },
    { id:'delivered', label:'Доставлены', count: orders.filter(o=>o.status==='delivered').length },
    { id:'cancelled', label:'Отменены', count: orders.filter(o=>o.status==='cancelled').length },
  ];

  return (
    <div className="flex flex-col h-full">
      <TopBar title="Входящие заказы" subtitle={`${orders.length} заказов всего`} newCount={newCount} />
      <StatsRow orders={orders} />

      {/* Controls */}
      <div className="px-4 pb-3 flex flex-wrap gap-2 items-center">
        <div className="relative flex-1 min-w-48">
          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Ic.search /></span>
          <input className="input-field pl-9 text-sm" placeholder="Поиск по номеру или покупателю..."
            value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        <select className="input-field w-auto text-sm" value={sortBy} onChange={e => setSortBy(e.target.value)}>
          <option value="date">По дате</option>
          <option value="amount">По сумме</option>
        </select>
        <button className={`btn-ghost py-2 px-3 ${refreshing?'opacity-50':''}`} onClick={handleRefresh} disabled={refreshing}>
          <span className={refreshing?'spinner':''}><Ic.refresh /></span>
          {refreshing ? 'Обновление...' : 'Обновить'}

      </div>

      {/* Status tabs */}
      <div className="px-4 pb-3 flex gap-1 overflow-x-auto">
        {tabs.map(tab => (

            style={filterStatus===tab.id ? {background:'var(--brand,#2455e8)'} : {}}
            onClick={() => setFilterStatus(tab.id)}>
            {tab.label}
            {tab.count > 0 && <span className={`px-1.5 py-0.5 rounded-full font-bold text-xs ${filterStatus===tab.id ? 'bg-white/20' : 'bg-slate-100 text-slate-600'}`}>{tab.count}</span>}

      {/* Table */}
      <div className="mx-4 card overflow-hidden flex-1">
        {/* Header */}

          <span className="text-xs font-semibold text-slate-500 uppercase tracking-wide hide-mobile">Сумма</span>
          <span className="text-xs font-semibold text-slate-500 uppercase tracking-wide">Статус</span>

        {filtered.length === 0 ? (

            <p className="text-slate-400 text-sm mt-1">Попробуйте изменить фильтр или поисковый запрос</p>

          filtered.map(order => (
            <div key={order.id} className="order-row fade-up" onClick={() => onSelect(order.id)}>

                <div className="flex items-center gap-2">

// ─── STATUS TRANSITION MODAL ──────────────────────────────────────────────────

function StatusModal({ order, onConfirm, onClose }) {
  const current = STATUSES[order.status];
  const nextId = current.next;
  const next = nextId ? STATUSES[nextId] : null;
  const [trackNum, setTrackNum] = useState(order.trackNumber || '');
  const [carrier, setCarrier] = useState(order.carrier || '');
  const [note, setNote] = useState('');
  const [loading, setLoading] = useState(false);

  async function handleConfirm() {
    setLoading(true);
    await new Promise(r => setTimeout(r, 1000));
    setLoading(false);
    onConfirm(nextId, { trackNumber: trackNum, carrier, note });
  }

  if (!next) return null;

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:'rgba(15,23,42,.5)', backdropFilter:'blur(4px)'}}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md pop">
        {/* Header */}
        <div className="px-5 py-4 border-b border-slate-100 flex items-center gap-3">
          <div className="w-10 h-10 rounded-xl flex items-center justify-center text-xl" style={{background: next.bg}}>
            {next.icon}
          </div>
          <div>
            <p className="text-sm font-bold text-slate-800">{current.nextLabel}</p>
            <p className="text-xs text-slate-500">Заказ {order.id}</p>
          </div>
          <button className="ml-auto text-slate-400 hover:text-slate-600 p-1" onClick={onClose}><Ic.cancel /></button>
        </div>

        <div className="p-5 space-y-4">
          {/* Status change visual */}
          <div className="flex items-center gap-3 bg-slate-50 rounded-xl p-3">
            <StatusBadge status={order.status} />
            <span className="text-slate-300">→</span>
            <StatusBadge status={nextId} />
          </div>

          {/* Track number (for shipped) */}
          {nextId === 'shipped' && (
            <>
              <div>
                <label className="text-xs font-semibold text-slate-600 block mb-1.5">Трек-номер <span className="text-red-400">*</span></label>
                <input className="input-field" placeholder="EM123456789RU" value={trackNum} onChange={e => setTrackNum(e.target.value)} />
              </div>
              <div>
                <label className="text-xs font-semibold text-slate-600 block mb-1.5">Служба доставки</label>
                <select className="input-field" value={carrier} onChange={e => setCarrier(e.target.value)}>
                  <option value="">Выберите...</option>
                  <option>СДЭК</option>
                  <option>Яндекс Доставка</option>
                  <option>Почта России</option>
                  <option>DHL</option>
                  <option>Boxberry</option>
                  <option>Самовывоз</option>
                </select>
              </div>
            </>
          )}

          {/* Note */}
          <div>
            <label className="text-xs font-semibold text-slate-600 block mb-1.5">Комментарий (необязательно)</label>
            <textarea className="input-field" rows={2} placeholder="Добавьте комментарий к изменению статуса..."
              value={note} onChange={e => setNote(e.target.value)} style={{resize:'none'}} />
          </div>

          {/* Info */}
          {nextId === 'shipped' && (
            <div className="text-xs text-blue-600 bg-blue-50 rounded-xl px-3 py-2.5 flex gap-2">
              <span>ℹ️</span>
              <span>Покупатель получит email-уведомление с трек-номером сразу после смены статуса</span>
            </div>
          )}
          {nextId === 'delivered' && (
            <div className="text-xs text-green-600 bg-green-50 rounded-xl px-3 py-2.5 flex gap-2">
              <span>✅</span>
              <span>После подтверждения доставки средства будут выплачены в ближайший расчётный период</span>
            </div>
          )}
          {nextId === 'accepted' && (
            <div className="text-xs text-amber-600 bg-amber-50 rounded-xl px-3 py-2.5 flex gap-2">
              <span>⚠️</span>
              <span>Убедитесь, что все товары есть в наличии перед принятием заказа</span>
            </div>
          )}
        </div>

        <div className="px-5 pb-5 flex gap-2">
          <button className="btn-ghost flex-1" onClick={onClose}>Отмена</button>
          <button className="btn-primary flex-1" onClick={handleConfirm} disabled={loading || (nextId==='shipped' && !trackNum.trim())}>
            {loading ? (
              <><svg className="spinner w-4 h-4 border-2 border-white border-t-transparent rounded-full" viewBox="0 0 16 16"/><span>Сохранение...</span></>
            ) : `Подтвердить`}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── CANCEL MODAL ─────────────────────────────────────────────────────────────

function CancelModal({ order, onConfirm, onClose }) {
  const [reason, setReason] = useState('');
  const [loading, setLoading] = useState(false);
  const reasons = ['Нет товара в наличии','Ошибка в заказе','По запросу покупателя','Технические проблемы','Другое'];

  async function handleConfirm() {
    if (!reason) return;
    setLoading(true);
    await new Promise(r => setTimeout(r, 900));
    setLoading(false);
    onConfirm(reason);
  }

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:'rgba(15,23,42,.5)', backdropFilter:'blur(4px)'}}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm pop">
        <div className="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
          <p className="text-sm font-bold text-red-600">Отменить заказ {order.id}</p>
          <button className="text-slate-400 hover:text-slate-600 p-1" onClick={onClose}><Ic.cancel /></button>
        </div>
        <div className="p-5 space-y-3">
          <p className="text-xs text-slate-500">Выберите причину отмены. Покупатель будет уведомлён, средства возвращены.</p>
          {reasons.map(r => (
            <label key={r} className="flex items-center gap-2.5 cursor-pointer group">
              <div className={`w-4 h-4 rounded-full border-2 flex-shrink-0 transition-all ${reason===r ? 'border-red-500' : 'border-slate-300 group-hover:border-slate-400'}`}
                style={reason===r ? {background:'#ef4444', borderColor:'#ef4444'} : {}}
                onClick={() => setReason(r)}>
                {reason===r && <div className="w-full h-full rounded-full bg-white scale-50 block"/>}
              </div>
              <span className={`text-sm ${reason===r ? 'text-slate-900 font-medium' : 'text-slate-600'}`}>{r}</span>
            </label>
          ))}
        </div>
        <div className="px-5 pb-5 flex gap-2">
          <button className="btn-ghost flex-1" onClick={onClose}>Назад</button>
          <button className="btn-danger flex-1" onClick={handleConfirm} disabled={!reason || loading}>
            {loading ? 'Отмена...' : 'Отменить заказ'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── ORDER DETAIL ─────────────────────────────────────────────────────────────

function OrderDetail({ orderId, orders, setOrders, onBack, tweaks }) {
  const order = orders.find(o => o.id === orderId);
  const [showStatusModal, setShowStatusModal] = useState(false);
  const [showCancelModal, setShowCancelModal] = useState(false);
  const [copied, setCopied] = useState(false);

  if (!order) return null;

  const status = STATUSES[order.status];
  const canCancel = ['new','accepted'].includes(order.status);
  const canAdvance = status.next !== null;
  const total = orderTotal(order);

  function advanceStatus(nextId, extra) {
    const now = new Date().toLocaleString('ru', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }).replace(',','');
    const newEntry = {
      status: nextId,
      label: STATUSES[nextId].label,
      time: now,
      note: extra.note || (nextId === 'shipped' && extra.trackNumber ? `Трек: ${extra.trackNumber} · ${extra.carrier}` : ''),
    };
    setOrders(prev => prev.map(o => o.id === orderId ? {
      ...o,
      status: nextId,
      updatedAt: now,
      ...(extra.trackNumber ? { trackNumber: extra.trackNumber } : {}),
      ...(extra.carrier ? { carrier: extra.carrier } : {}),
      timeline: [...o.timeline, newEntry],
    } : o));
    setShowStatusModal(false);
  }

  function cancelOrder(reason) {
    const now = new Date().toLocaleString('ru', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }).replace(',','');
    setOrders(prev => prev.map(o => o.id === orderId ? {
      ...o, status:'cancelled', updatedAt: now,
      timeline: [...o.timeline, { status:'cancelled', label:'Отменён', time: now, note: reason }],
    } : o));
    setShowCancelModal(false);
  }

  function copyTrack() {
    if (order.trackNumber) {
      navigator.clipboard?.writeText(order.trackNumber).catch(()=>{});
      setCopied(true);
      setTimeout(()=>setCopied(false), 2000);
    }
  }

  const flowStep = STATUS_FLOW.indexOf(order.status);

  return (
    <>
      <div className="flex flex-col h-full">
        <TopBar
          title={`Заказ ${order.id}`}
          subtitle={`${order.buyerName} · ${order.createdAt}`}
          onBack={onBack}
          newCount={0}
        />

        <div className="flex-1 overflow-auto">
          <div className="max-w-4xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-4">

            {/* LEFT COL */}
            <div className="lg:col-span-2 space-y-4">

              {/* Status flow */}
              <div className="card p-4 slide-in">
                <div className="flex items-center justify-between mb-4">
                  <p className="text-sm font-semibold text-slate-800">Статус заказа</p>
                  <StatusBadge status={order.status} />
                </div>

                {/* Flow tracker */}
                {order.status !== 'cancelled' && (
                  <div className="flex items-center gap-0 mb-5">
                    {STATUS_FLOW.map((s, i) => {
                      const done = flowStep > i;
                      const active = flowStep === i;
                      const st = STATUSES[s];
                      return (
                        <React.Fragment key={s}>
                          <div className="flex flex-col items-center gap-1" style={{flex: i < STATUS_FLOW.length-1 ? '0 0 auto' : '0 0 auto'}}>
                            <div className={`timeline-dot text-sm font-bold transition-all duration-300
                              ${done ? 'text-white' : active ? 'text-white' : 'text-slate-400'}`}
                              style={done || active ? {background: done ? '#22c55e' : st.color} : {background:'#f1f4f9', border:'2px solid #e2e8f0'}}>
                              {done ? <Ic.check size={14}/> : st.icon}
                            </div>
                            <span className={`text-xs font-medium text-center leading-tight transition-colors whitespace-nowrap ${active ? 'text-slate-800' : done ? 'text-green-600' : 'text-slate-400'}`} style={{fontSize:'10px', maxWidth:'60px'}}>
                              {st.label}
                            </span>
                          </div>
                          {i < STATUS_FLOW.length-1 && (
                            <div className="flex-1 h-0.5 mx-1 mb-5 transition-all duration-500" style={{background: done ? '#22c55e' : '#e2e8f0', minWidth:'12px'}} />
                          )}
                        </React.Fragment>
                      );
                    })}
                  </div>
                )}

                {/* Action buttons */}
                <div className="flex flex-wrap gap-2">
                  {canAdvance && (
                    <button className="btn-primary" onClick={() => setShowStatusModal(true)}>
                      {status.icon} {status.nextLabel}

                  )}
                  {canCancel && (
                    <button className="btn-danger" onClick={() => setShowCancelModal(true)}>
                      <Ic.cancel /> Отменить заказ
                    </button>
                  )}
                  <button className="btn-ghost"><Ic.print /> Печать</button>
                  <button className="btn-ghost"><Ic.chat /> Написать покупателю</button>
                </div>
              </div>

              {/* Items */}
              <div className="card overflow-hidden slide-in">
                <div className="px-4 py-3 border-b border-slate-50 flex items-center justify-between">
                  <p className="text-sm font-semibold text-slate-800">Товары</p>
                  <span className="text-xs text-slate-400">{order.items.length} позиции</span>
                </div>
                <div className="divide-y divide-slate-50">
                  {order.items.map(item => (
                    <div key={item.id} className="flex items-center gap-3 px-4 py-3">
                      <div className="w-10 h-10 rounded-xl bg-slate-50 border border-slate-100 flex items-center justify-center text-xl flex-shrink-0">
                        {item.image}
                      </div>
                      <div className="flex-1 min-w-0">
                        <p className="text-sm font-medium text-slate-800 truncate">{item.name}</p>
                        <p className="text-xs text-slate-400 mt-0.5">Арт: {item.sku}</p>
                      </div>
                      <div className="text-right flex-shrink-0">
                        <p className="text-sm font-semibold text-slate-900">{fmt(item.price * item.qty)}</p>
                        <p className="text-xs text-slate-400">{fmt(item.price)} × {item.qty}</p>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="px-4 py-3 bg-slate-50 border-t border-slate-100 flex items-center justify-between">
                  <span className="text-sm text-slate-600">Итого по заказу</span>
                  <span className="text-base font-bold text-slate-900">{fmt(total)}</span>
                </div>
              </div>

              {/* Timeline */}
              <div className="card p-4 slide-in">
                <p className="text-sm font-semibold text-slate-800 mb-4">История событий</p>
                <div className="space-y-0">
                  {[...order.timeline].reverse().map((entry, i) => {
                    const s = STATUSES[entry.status];
                    return (
                      <div key={i} className="flex gap-3">

                          <div className="w-8 h-8 rounded-full flex items-center justify-center text-sm flex-shrink-0" style={{background: s?.bg || '#f1f4f9'}}>
                            {s?.icon || '•'}

                          {i < order.timeline.length - 1 && <div className="w-0.5 flex-1 my-1.5" style={{background:'#e8edf4', minHeight:'16px'}} />}

                            <span className="text-xs text-slate-400">{entry.time}</span>

                          {entry.note && <p className="text-xs text-slate-500 mt-0.5">{entry.note}</p>}

            {/* RIGHT COL */}
            <div className="space-y-4">

              {/* Buyer */}
              <div className="card p-4 slide-in">
                <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-3">Покупатель</p>

                    <p className="text-sm font-semibold text-slate-800">{order.buyerName}</p>

                </div>
                <div className="space-y-2 text-xs">
                  <div className="flex items-center gap-2 text-slate-600">
                    <span>📧</span>
                    <a href={`mailto:${order.buyerEmail}`} className="hover:underline" style={{color:'var(--brand,#2455e8)'}}>{order.buyerEmail}</a>
                  </div>
                  <div className="flex items-center gap-2 text-slate-600">
                    <span>📞</span><span>{order.buyerPhone}</span>
                  </div>
                </div>
                {order.comment && (
                  <div className="mt-3 pt-3 border-t border-slate-50">
                    <p className="text-xs font-semibold text-slate-500 mb-1">Комментарий к заказу:</p>
                    <p className="text-xs text-slate-600 leading-relaxed italic">«{order.comment}»</p>
                  </div>
                )}
              </div>

              {/* Delivery */}
              <div className="card p-4 slide-in">
                <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-3">Доставка</p>
                <div className="space-y-2.5 text-xs">
                  <div>
                    <p className="text-slate-500 mb-0.5">Способ</p>
                    <p className="font-medium text-slate-800">{order.deliveryType}</p>
                  </div>
                  <div>
                    <p className="text-slate-500 mb-0.5">Адрес</p>
                    <p className="font-medium text-slate-800">{order.deliveryAddress}</p>
                    <p className="text-slate-400">{order.deliveryZip}</p>
                  </div>
                  {order.trackNumber && (
                    <div>
                      <p className="text-slate-500 mb-0.5">Трек-номер</p>
                      <div className="flex items-center gap-2">
                        <p className="font-mono font-semibold text-slate-800">{order.trackNumber}</p>
                        <button className="text-slate-400 hover:text-slate-600 p-0.5" onClick={copyTrack} title="Скопировать">
                          {copied ? <Ic.check size={13}/> : <Ic.copy />}
                        </button>
                      </div>
                      {order.carrier && <p className="text-slate-400">{order.carrier}</p>}
                    </div>
                  )}
                </div>
              </div>

              {/* Payment */}
              <div className="card p-4 slide-in">
                <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-3">Оплата</p>
                <div className="space-y-2 text-xs">
                  <div className="flex justify-between">
                    <span className="text-slate-500">Способ</span>
                    <span className="font-medium text-slate-800">{order.paymentType}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-500">Статус</span>
                    <span className={`font-semibold ${order.paymentStatus==='оплачен' ? 'text-green-600' : order.paymentStatus==='возврат' ? 'text-red-500' : 'text-amber-500'}`}>
                      {order.paymentStatus}
                    </span>
                  </div>
                  <div className="flex justify-between pt-2 border-t border-slate-50">
                    <span className="font-semibold text-slate-700">Итого</span>
                    <span className="font-bold text-slate-900">{fmt(total)}</span>
                  </div>
                  <div className="flex justify-between text-slate-400">
                    <span>Комиссия (8%)</span>
                    <span>−{fmt(Math.round(total * 0.08))}</span>
                  </div>
                  <div className="flex justify-between pt-1 border-t border-slate-50">
                    <span className="font-semibold text-slate-700">К выплате</span>
                    <span className="font-bold text-green-700">{fmt(Math.round(total * 0.92))}</span>
                  </div>
                </div>
              </div>

              {/* Quick actions */}
              <div className="card p-4 slide-in">
                <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-3">Действия</p>
                <div className="space-y-2">
                  <button className="btn-ghost w-full justify-center text-xs py-2"><Ic.print /> Распечатать накладную</button>
                  <button className="btn-ghost w-full justify-center text-xs py-2"><Ic.box /> Скачать этикетку</button>
                  <button className="btn-ghost w-full justify-center text-xs py-2"><Ic.chat /> Сообщение покупателю</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      {showStatusModal && (
        <StatusModal order={order} onConfirm={advanceStatus} onClose={() => setShowStatusModal(false)} />
      )}
      {showCancelModal && (
        <CancelModal order={order} onConfirm={cancelOrder} onClose={() => setShowCancelModal(false)} />
      )}
    </>
  );
}

// ─── PLACEHOLDER VIEWS ────────────────────────────────────────────────────────

function PlaceholderView({ icon, title, desc }) {
  return (
    <div className="flex flex-col h-full">
      <div className="bg-white border-b border-slate-100 px-5 py-3.5">
        <h1 className="text-base font-bold text-slate-900">{title}</h1>
      </div>
      <div className="flex-1 flex items-center justify-center p-8 text-center">
        <div>
          <div className="text-5xl mb-4">{icon}</div>
          <p className="text-slate-700 font-semibold">{title}</p>
          <p className="text-slate-400 text-sm mt-2">{desc}</p>
          <div className="mt-4 px-4 py-2 rounded-xl bg-slate-100 text-xs text-slate-500 inline-block">
            Этот раздел не входит в прототип V-3
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════════════════════════

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#2455e8",
  "vendorName": "TechPro Solutions",
  "commission": "8",
  "showPayouts": true,
  "autoAccept": false
}/*EDITMODE-END*/;

function App() {
  const hookResult = window.useTweaks ? window.useTweaks(TWEAK_DEFAULTS) : {};
  const tweaks = (hookResult && hookResult.tweaks) || TWEAK_DEFAULTS;
  const TweaksPanel = (hookResult && hookResult.TweaksPanel) || window.TweaksPanel;
  const TweakSection = (hookResult && hookResult.TweakSection) || window.TweakSection;
  const TweakToggle = (hookResult && hookResult.TweakToggle) || window.TweakToggle;
  const TweakColor = (hookResult && hookResult.TweakColor) || window.TweakColor;
  const TweakText = (hookResult && hookResult.TweakText) || window.TweakText;
  const TweakSelect = (hookResult && hookResult.TweakSelect) || window.TweakSelect;

  const [view, setView] = useState('orders');
  const [selectedOrderId, setSelectedOrderId] = useState(null);
  const [orders, setOrders] = useState(makeOrders);

  useEffect(() => {
    document.documentElement.style.setProperty('--brand', tweaks.accentColor || '#2455e8');
  }, [tweaks.accentColor]);

  const newCount = orders.filter(o => o.status === 'new').length;

  function selectOrder(id) {
    setSelectedOrderId(id);
    setView('orders-detail');
  }

  function backToList() {
    setSelectedOrderId(null);
    setView('orders');
  }

  const placeholders = {
    catalog: { icon:'🛍️', title:'Каталог товаров', desc:'Управление листингами, ценами, остатками' },
    analytics: { icon:'📊', title:'Аналитика продаж', desc:'Выручка, конверсии, популярные товары' },
    payments: { icon:'💰', title:'Выплаты', desc:'История выплат, расчётный счёт, документы' },
    reviews: { icon:'⭐', title:'Отзывы', desc:'Отзывы покупателей, рейтинг продавца' },
    settings: { icon:'⚙️', title:'Настройки', desc:'Профиль компании, уведомления, интеграции' },
  };

  return (
    <div className="flex h-screen overflow-hidden" style={{'--brand': tweaks.accentColor || '#2455e8'}}>
      <Sidebar activeView={view} setView={(v) => { setView(v); setSelectedOrderId(null); }} newCount={newCount} />

      <main className="flex-1 overflow-auto flex flex-col bg-slate-50">
        {view === 'orders' && (
          <OrdersList orders={orders} setOrders={setOrders} onSelect={selectOrder} tweaks={tweaks} />
        )}
        {view === 'orders-detail' && selectedOrderId && (
          <OrderDetail orderId={selectedOrderId} orders={orders} setOrders={setOrders} onBack={backToList} tweaks={tweaks} />
        )}
        {Object.entries(placeholders).map(([key, p]) =>
          view === key ? <PlaceholderView key={key} {...p} /> : null
        )}
      </main>

      {/* Tweaks */}
      {TweaksPanel && TweakSection && (
        <TweaksPanel>
          <TweakSection title="Брендинг">
            {TweakColor && <TweakColor id="accentColor" label="Цвет акцента" />}
            {TweakText && <TweakText id="vendorName" label="Название продавца" />}
          </TweakSection>
          <TweakSection title="Бизнес-логика">
            {TweakSelect && <TweakSelect id="commission" label="Комиссия %" options={[
              {value:'5', label:'5% (Про)'},
              {value:'8', label:'8% (Стандарт)'},
            ]} />}
            {TweakToggle && <TweakToggle id="showPayouts" label="Показывать выплаты" />}
            {TweakToggle && <TweakToggle id="autoAccept" label="Автоприём заказов" />}
          </TweakSection>
        </TweaksPanel>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
